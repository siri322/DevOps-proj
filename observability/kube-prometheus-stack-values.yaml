grafana:
  enabled: true
  adminPassword: "change-me-through-external-secret"
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.dev.mobility.example.com

prometheus:
  prometheusSpec:
    retention: 15d
    scrapeInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    retention: 120h
