name: Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: false
        type: string
        default: ""
      deploy:
        description: "Deploy through Argo CD"
        required: false
        type: boolean
        default: true

jobs:
  pipeline:
    uses: ./.github/workflows/reusable-ci-cd.yml
    with:
      environment: dev
      image_tag: ${{ inputs.image_tag || github.sha }}
      deploy: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy || true }}
    secrets: inherit
