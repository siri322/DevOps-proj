name: Deploy to Prod

on:
  push:
    branches:
      - main

permissions:
  contents: write
  security-events: write

jobs:
  # 1. Booking Service
  deploy-booking-service:
    uses: ./.github/workflows/reusable-ci-cd.yml
    with:
      service-name: booking-service
      environment: prod
      image-name: booking-service

  # 2. Payment Service
  deploy-payment-service:
    uses: ./.github/workflows/reusable-ci-cd.yml
    with:
      service-name: payment
      environment: prod
      image-name: payment

  # 3. Driver App
  deploy-driver-app:
    uses: ./.github/workflows/reusable-ci-cd.yml
    with:
      service-name: driver-app
      environment: prod
      image-name: driver-app

  # 4. Consumer App
  deploy-consumer-app:
    uses: ./.github/workflows/reusable-ci-cd.yml
    with:
      service-name: consumer-app
      environment: prod
      image-name: consumer-app

