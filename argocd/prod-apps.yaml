apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-booking-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/my-org/DevOps_project.git'
    targetRevision: HEAD
    path: helm/charts/microservice
    helm:
      valueFiles:
        - ../../environments/prod-values.yaml
      parameters:
        - name: image.repository
          value: ghcr.io/your-github-username/booking-service
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
---
